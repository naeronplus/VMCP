# Local stack: Postgres, Redis, MinIO, orchestrator (+ dashboard static), sandbox.
#
# Fresh clone:
#   cp .env.example .env
#   bash scripts/generate-jwt-keys.sh   # writes secrets/jwt-*.pem (gitignored)
#   # Point JWT_*_PATH in .env at those files (defaults already match)
#   docker compose up --build
#
# DEP-03: orchestrator healthcheck hits GET /ready; sandbox hits GET /health.
# Compose waits for service_healthy before dependents start (where declared).
#
# Commit-agent + target-provisioner are NOT run in Compose — install on target hosts:
#   bash packages/commit-agent/scripts/install.sh
#   bash packages/target-provisioner/scripts/install.sh
#   See packages/commit-agent/README.md (DEP-02), packages/target-provisioner/README.md (DEP-04).
# MINIO-HC: minio healthcheck + minio-init waits for service_healthy.
#
# Optional hot-reload profile (host-mounted source):
#   docker compose --profile dev up

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pgos
      POSTGRES_PASSWORD: pgos
      POSTGRES_DB: pgos
    ports:
      - "5432:5432"
    volumes:
      - pgos_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgos -d pgos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - pgos_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - pgos_minio:/data
    # MINIO-HC: live health before minio-init / S3-dependent services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/pgos-artifacts || true;
      exit 0;
      "

  # Single npm ci so orchestrator + sandbox do not race on the bind-mounted tree.
  npm-ci:
    image: node:20-bookworm
    working_dir: /app
    command: sh -c "npm ci"
    volumes:
      - .:/app

  # Prod-like: full monorepo compile inside the container (no host dist/ required).
  # Builds shared + dashboard + orchestrator so resolveDashboardDist() finds static assets.
  # DEP-03: healthcheck uses /ready (fails when Postgres/Redis down).
  orchestrator:
    image: node:20-bookworm
    working_dir: /app
    command: >
      sh -c "npm run build -w @vibrato/shared
      && npm run build -w @vibrato/dashboard
      && npm run build -w @vibrato/orchestrator
      && npm run db:migrate -w @vibrato/orchestrator
      && npm run start -w @vibrato/orchestrator"
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pgos:pgos@postgres:5432/pgos
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      SANDBOX_SERVICE_URL: http://sandbox:8090
    healthcheck:
      # DEP-03: /ready (not /health) — fails when Postgres/Redis down. Node fetch (no curl required).
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    depends_on:
      npm-ci:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      sandbox:
        condition: service_healthy

  sandbox:
    image: node:20-bookworm
    working_dir: /app
    command: >
      sh -c "npm run build -w @vibrato/sandbox-service
      && npm run start -w @vibrato/sandbox-service"
    volumes:
      - .:/app
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      NODE_ENV: development
      SANDBOX_INTERNAL_TOKEN: dev-sandbox-token
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8090/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    depends_on:
      npm-ci:
        condition: service_completed_successfully

  # Dev profile: tsx watch. Usage:
  #   docker compose --profile dev up npm-ci postgres redis minio minio-init sandbox-dev orchestrator-dev
  orchestrator-dev:
    profiles: ["dev"]
    image: node:20-bookworm
    working_dir: /app
    command: >
      sh -c "npm run build -w @vibrato/shared
      && npm run build -w @vibrato/dashboard
      && npm run db:migrate -w @vibrato/orchestrator
      && npm run dev -w @vibrato/orchestrator"
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pgos:pgos@postgres:5432/pgos
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      SANDBOX_SERVICE_URL: http://sandbox-dev:8090
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    depends_on:
      npm-ci:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      sandbox-dev:
        condition: service_healthy

  sandbox-dev:
    profiles: ["dev"]
    image: node:20-bookworm
    working_dir: /app
    command: sh -c "npm run dev -w @vibrato/sandbox-service"
    volumes:
      - .:/app
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      NODE_ENV: development
      SANDBOX_INTERNAL_TOKEN: dev-sandbox-token
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8090/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    depends_on:
      npm-ci:
        condition: service_completed_successfully

volumes:
  pgos_pg:
  pgos_redis:
  pgos_minio:
