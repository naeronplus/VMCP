# Vibrato PGOS — Railway service: orchestrator (+ embedded dashboard static)
# M-08: sandbox-service is a SEPARATE Railway service — see packages/sandbox-service/railway.toml
#        and docs/deploy/railway.md. Wire SANDBOX_SERVICE_URL on this service after both are up.
# M-09: healthcheckPath is /ready (Postgres + Redis), not /health (liveness-only).

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npm run db:migrate && npm run start -w @vibrato/orchestrator"
# Readiness: fails while DATABASE_URL / REDIS_URL unreachable (503)
healthcheckPath = "/ready"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[env]
NODE_ENV = "production"
# Set in Railway UI / variables (do not commit secrets):
# DATABASE_URL, REDIS_URL, JWT_*, JWE_SECRET, SANDBOX_SERVICE_URL, SANDBOX_INTERNAL_TOKEN,
# GITHUB_*, S3_*, PUBLIC_BASE_URL, …
