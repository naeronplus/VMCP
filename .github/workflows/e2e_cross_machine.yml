# TEST-01 / plan §11.1.3.3 — gated cross-machine E2E (secrets required).
# Runs on Tier A self-hosted runner with optional live orchestrator checks.
name: Cross-machine E2E

on:
  workflow_dispatch:
    inputs:
      godotVersion:
        description: Godot version (exact semver)
        required: true
        default: '4.3.1'
      runLiveApi:
        description: Run live orchestrator API supplement (1=yes)
        required: false
        default: '0'

permissions:
  contents: read

jobs:
  e2e:
    name: TEST-01 cross-machine E2E
    runs-on: [self-hosted, godot-worker]
    timeout-minutes: 120
    # Secrets required — fail closed if missing
    env:
      PGOS_BASE_URL: ${{ secrets.PGOS_BASE_URL }}
      PGOS_ADMIN_TOKEN: ${{ secrets.PGOS_ADMIN_TOKEN }}
      E2E_GODOT_VERSION: ${{ inputs.godotVersion }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: npm ci

      - name: Assert required secrets
        run: |
          set -euo pipefail
          missing=0
          for v in PGOS_BASE_URL PGOS_ADMIN_TOKEN; do
            if [[ -z "${!v:-}" ]]; then
              echo "ERROR: secret $v is required for live E2E" >&2
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      # Automated 7/7 scenario validators (always)
      - name: Run cross-machine E2E scenario driver
        run: node scripts/run-cross-machine-e2e.mjs

      - name: Live orchestrator API supplement
        if: inputs.runLiveApi == '1'
        run: node scripts/run-cross-machine-e2e.mjs --mode live

      - name: R6 gate (full regression + evidence contracts)
        run: npm run verify:r6

      - name: Upload E2E evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: cross-machine-e2e-evidence
          path: |
            docs/e2e/cross-machine-e2e-summary.md
            docs/e2e/cross-machine-e2e-*.log
          if-no-files-found: error