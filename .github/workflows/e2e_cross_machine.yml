# TEST-01 / plan §7.3 — gated cross-machine E2E (secrets required; live mandatory by default).
# Fail closed: missing PGOS_BASE_URL / PGOS_ADMIN_TOKEN aborts before any scenarios.
name: Cross-machine E2E

on:
  workflow_dispatch:
    inputs:
      godotVersion:
        description: Godot version (exact semver)
        required: true
        default: '4.3.1'
      runLiveApi:
        description: 'Run live orchestrator API (mandatory default=1; set 0 only for break-glass automated-only)'
        required: false
        default: '1'

permissions:
  contents: read

jobs:
  e2e:
    name: TEST-01 automated + live E2E
    runs-on: [self-hosted, godot-worker]
    timeout-minutes: 120
    env:
      PGOS_BASE_URL: ${{ secrets.PGOS_BASE_URL }}
      PGOS_ADMIN_TOKEN: ${{ secrets.PGOS_ADMIN_TOKEN }}
      PGOS_SERVICE_TOKEN: ${{ secrets.PGOS_SERVICE_TOKEN }}
      E2E_GODOT_VERSION: ${{ inputs.godotVersion }}
      E2E_TARGET_HOST: ${{ vars.E2E_TARGET_HOST }}
      E2E_TARGET_PROVISION_URL: ${{ vars.E2E_TARGET_PROVISION_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: npm ci

      - name: Assert required secrets (fail closed)
        run: |
          set -euo pipefail
          missing=0
          for v in PGOS_BASE_URL PGOS_ADMIN_TOKEN; do
            if [[ -z "${!v:-}" ]]; then
              echo "ERROR: secret $v is required for cross-machine E2E (fail closed)" >&2
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "Configure GitHub Actions secrets: PGOS_BASE_URL, PGOS_ADMIN_TOKEN" >&2
            echo "Optional: PGOS_SERVICE_TOKEN; vars E2E_TARGET_HOST, E2E_TARGET_PROVISION_URL" >&2
            exit 1
          fi

      # Automated 8/8 scenario validators
      - name: Run automated cross-machine E2E (scenarios 1–8)
        run: node scripts/run-cross-machine-e2e.mjs

      # P2.3: live is default-on (runLiveApi=1). Writes docs/e2e/cross-machine-e2e-live-<date>.log
      - name: Live orchestrator API (mandatory default)
        if: inputs.runLiveApi == '1'
        run: node scripts/run-cross-machine-e2e.mjs --mode live

      - name: Assert live evidence when live was required
        if: inputs.runLiveApi == '1'
        run: |
          set -euo pipefail
          shopt -s nullglob
          logs=(docs/e2e/cross-machine-e2e-live-*.log)
          if [[ ${#logs[@]} -eq 0 ]]; then
            echo "ERROR: no docs/e2e/cross-machine-e2e-live-*.log after live run" >&2
            exit 1
          fi
          found=0
          for f in "${logs[@]}"; do
            if grep -q 'LIVE PASS' "$f"; then
              echo "Live evidence OK: $f"
              found=1
            fi
          done
          if [[ "$found" -ne 1 ]]; then
            echo "ERROR: live log missing LIVE PASS marker" >&2
            exit 1
          fi

      - name: R6 gate (full regression + evidence contracts)
        run: npm run verify:r6

      - name: Upload E2E evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: cross-machine-e2e-evidence
          path: |
            docs/e2e/cross-machine-e2e-summary.md
            docs/e2e/cross-machine-e2e-*.log
            docs/e2e/cross-machine-e2e-live-*.log
          if-no-files-found: error
